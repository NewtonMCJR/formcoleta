<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Coleta - RH LAMES</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 p-4 md:p-10 font-sans antialiased text-slate-800">

    <div class="max-w-5xl mx-auto bg-white p-8 md:p-12 rounded-3xl shadow-2xl shadow-slate-200 border border-slate-100">

        <header class="mb-12 pb-6 border-b border-slate-100 flex items-center gap-4">
            <div class="p-3 bg-blue-600 text-white rounded-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a2 2 0 00-1.96 1.414l-.727 2.182a10.001 10.001 0 01-11.314-11.314l2.182-.727a2 2 0 001.414-1.96l-.477-2.387a2 2 0 00-.547-1.022L7.902 4.86a2 2 0 00-3.073.364l-1.572 2.358a1 1 0 00-.126.915 13.993 13.993 0 0013.993 13.993 1 1 0 00.915-.126l2.358-1.572a2 2 0 00.364-3.073l-1.572-1.572z" />
                </svg>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Cadastro RH LAMES</h1>
                <p class="text-slate-600 mt-1">Por favor, preencha todos os campos com atenção para o registro no
                    sistema Coleta.</p>
            </div>
        </header>

        <form id="coletaForm" class="space-y-12">

            <section class="space-y-6">
                <div class="flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-blue-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                    </svg>
                    <h2 class="text-2xl font-bold text-slate-900 tracking-tight">1. Identificação</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
                    <div>
                        <label for="tipo_integrante" class="block text-sm font-semibold text-slate-700 mb-1.5">Tipo de
                            Integrante</label>
                        <select id="tipo_integrante" name="tipo_integrante"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base">
                            <option value="" disabled selected>Selecione uma opção</option>
                            <option value="servidor">Servidor</option>
                            <option value="aluno_interno">Aluno Interno</option>
                            <option value="aluno_externo">Aluno Externo</option>
                            <option value="bolsista">Bolsista</option>
                            <option value="terceirizado">Terceirizado</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="space-y-6">
                <div class="flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-blue-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    <h2 class="text-2xl font-bold text-slate-900 tracking-tight">2. Dados Pessoais</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
                    <div class="md:col-span-2">
                        <label for="nome_completo" class="block text-sm font-semibold text-slate-700 mb-1.5">Nome
                            Completo</label>
                        <input type="text" id="nome_completo" name="nome_completo"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base"
                            placeholder="Ex: Antônio da Silva">
                    </div>
                    <div>
                        <label for="cpf" class="block text-sm font-semibold text-slate-700 mb-1.5">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base">
                    </div>
                    <div>
                        <label for="rg" class="block text-sm font-semibold text-slate-700 mb-1.5">RG /
                            Identidade</label>
                        <input type="text" id="rg" name="rg"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base"
                            placeholder="Ex: MG-12.345.678">
                    </div>
                    <div class="md:col-span-2">
                        <label for="endereco" class="block text-sm font-semibold text-slate-700 mb-1.5">Endereço
                            Residencial</label>
                        <input type="text" id="endereco" name="endereco"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base"
                            placeholder="Rua, Número, Bairro, Cidade - Estado">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">E-mail</label>
                        <input type="email" id="email" name="email"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base"
                            placeholder="exemplo@email.com">
                    </div>
                    <div>
                        <label for="telefone" class="block text-sm font-semibold text-slate-700 mb-1.5">Telefone de
                            Contato</label>
                        <input type="text" id="telefone" name="telefone"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base"
                            placeholder="(00) 00000-0000">
                    </div>
                </div>
            </section>

            <section class="space-y-6">
                <div class="flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-blue-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                    <h2 class="text-2xl font-bold text-slate-900 tracking-tight">3. Saúde e Emergência</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-x-6 gap-y-6">
                    <div>
                        <label for="grupo_sanguineo" class="block text-sm font-semibold text-slate-700 mb-1.5">Grupo
                            Sanguíneo</label>
                        <select id="grupo_sanguineo" name="grupo_sanguineo"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base">
                            <option value="" disabled selected>Selecione</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label for="alergias" class="block text-sm font-semibold text-slate-700 mb-1.5">Alergias</label>
                        <input type="text" id="alergias" name="alergias" placeholder="Caso possua, especifique"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base">
                    </div>
                    <div class="md:col-span-3">
                        <label for="contato_emergencia"
                            class="block text-sm font-semibold text-slate-700 mb-1.5">Contato de Emergência (Nome e
                            Tel)</label>
                        <input type="text" id="contato_emergencia" name="contato_emergencia"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base"
                            placeholder="Ex: Maria (Mãe) - (00) 99999-9999">
                    </div>
                </div>
            </section>

            <section class="space-y-6">
                <div class="flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-blue-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.825-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
                    </svg>
                    <h2 class="text-2xl font-bold text-slate-900 tracking-tight">4. Formação Acadêmica</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
                    <div>
                        <label for="titulacao" class="block text-sm font-semibold text-slate-700 mb-1.5">Titulação
                            Máxima</label>
                        <input type="text" id="titulacao" name="titulacao" placeholder="Ex: Mestre, Doutor"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base">
                    </div>
                    <div>
                        <label for="local_formacao" class="block text-sm font-semibold text-slate-700 mb-1.5">Local de
                            Formação</label>
                        <input type="text" id="local_formacao" name="local_formacao"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base"
                            placeholder="Nome da Instituição">
                    </div>
                    <div>
                        <label for="ano_conclusao" class="block text-sm font-semibold text-slate-700 mb-1.5">Ano de
                            Conclusão</label>
                        <input type="number" id="ano_conclusao" name="ano_conclusao"
                            class="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition duration-150 ease-in-out text-base"
                            placeholder="Ex: 2023">
                    </div>
                    <div>
                        <label for="diploma" class="block text-sm font-semibold text-slate-700 mb-1.5">Anexar Diploma
                            (PDF/JPG)</label>
                        <div
                            class="w-full rounded-xl border border-slate-200 p-1.5 bg-slate-50 focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 transition duration-150 ease-in-out">
                            <input type="file" id="diploma" name="diploma" accept=".pdf,.jpg,.jpeg"
                                class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-5 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 file:cursor-pointer">
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-blue-50 p-8 rounded-2xl border border-blue-100 space-y-6">
                <div class="flex items-center gap-3 border-b border-blue-100 pb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-blue-700" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                    <h2 class="text-2xl font-bold text-blue-900 tracking-tight">5. Informações do Coleta (Anual)</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
                    <div>
                        <label for="vinculo" class="block text-sm font-semibold text-blue-900 mb-1.5">Vínculo</label>
                        <input type="text" id="vinculo" name="vinculo"
                            class="w-full rounded-xl border border-blue-200 p-3 bg-white placeholder-blue-300 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 transition duration-150 ease-in-out text-base">
                    </div>
                    <div>
                        <label for="prazo_vinculo" class="block text-sm font-semibold text-blue-900 mb-1.5">Prazo do
                            Vínculo</label>
                        <input type="text" id="prazo_vinculo" name="prazo_vinculo"
                            class="w-full rounded-xl border border-blue-200 p-3 bg-white placeholder-blue-300 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 transition duration-150 ease-in-out text-base">
                    </div>
                    <div>
                        <label for="origem_vinculo" class="block text-sm font-semibold text-blue-900 mb-1.5">Origem do
                            Vínculo</label>
                        <input type="text" id="origem_vinculo" name="origem_vinculo"
                            class="w-full rounded-xl border border-blue-200 p-3 bg-white placeholder-blue-300 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 transition duration-150 ease-in-out text-base">
                    </div>
                    <div>
                        <label for="cargo_nivel" class="block text-sm font-semibold text-blue-900 mb-1.5">Cargo /
                            Nível</label>
                        <input type="text" id="cargo_nivel" name="cargo_nivel"
                            class="w-full rounded-xl border border-blue-200 p-3 bg-white placeholder-blue-300 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 transition duration-150 ease-in-out text-base">
                    </div>
                    <div>
                        <label for="situacao_atual" class="block text-sm font-semibold text-blue-900 mb-1.5">Situação
                            Atual</label>
                        <input type="text" id="situacao_atual" name="situacao_atual"
                            class="w-full rounded-xl border border-blue-200 p-3 bg-white placeholder-blue-300 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 transition duration-150 ease-in-out text-base">
                    </div>
                    <div class="flex items-center gap-3 h-full pt-6">
                        <input type="checkbox" id="e_docente" name="e_docente"
                            class="w-5 h-5 rounded border-blue-300 text-blue-700 shadow-sm focus:ring-blue-500 focus:ring-offset-blue-50">
                        <label for="e_docente" class="text-base font-semibold text-blue-950">É Docente?</label>
                    </div>
                    <div class="md:col-span-2">
                        <label for="orientador" class="block text-sm font-semibold text-blue-900 mb-1.5">Orientador (se
                            aplicável)</label>
                        <input type="text" id="orientador" name="orientador"
                            class="w-full rounded-xl border border-blue-200 p-3 bg-white placeholder-blue-300 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 transition duration-150 ease-in-out text-base">
                    </div>
                </div>
            </section>

            <footer class="flex justify-end gap-4 pt-10 border-t border-slate-100 mt-12">
                <button type="button"
                    class="bg-slate-100 text-slate-700 px-8 py-4 rounded-xl font-bold hover:bg-slate-200 transition duration-150 shadow-sm">
                    Cancelar
                </button>
                <button type="submit"
                    class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-700 transition duration-150 shadow-lg shadow-blue-200 transform hover:-translate-y-0.5">
                    Salvar Cadastro
                </button>
            </footer>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const coletaForm = document.getElementById('coletaForm');

        coletaForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            // 1. Notificação de "Processando"
            Swal.fire({
                title: 'Enviando dados...',
                text: 'Aguarde enquanto registramos as informações no sistema.',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            // Simulação de envio para o Backend (Firebase ou Supabase)
            try {
                const formData = Object.fromEntries(new FormData(e.target));
                console.log('Dados capturados:', formData);

                // Simulando um delay de rede de 1.5 segundos
                await new Promise(resolve => setTimeout(resolve, 1500));

                // 2. Notificação de Sucesso
                Swal.fire({
                    icon: 'success',
                    title: 'Cadastro Realizado!',
                    text: 'Os dados do colaborador foram salvos com sucesso no banco do LAMES.',
                    confirmButtonColor: '#2563eb', // Azul do Tailwind que você está usando
                    confirmButtonText: 'Ótimo!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        // Opcional: Limpar o formulário após o sucesso
                        // coletaForm.reset();
                    }
                });

            } catch (error) {
                // 3. Notificação de Erro
                Swal.fire({
                    icon: 'error',
                    title: 'Ops! Algo deu errado',
                    text: 'Não foi possível conectar ao servidor. Tente novamente em instantes.',
                    confirmButtonColor: '#ef4444'
                });
            }
        });

        // Bônus: Confirmação ao clicar em Cancelar
        const btnCancelar = document.querySelector('button[type="button"]');
        btnCancelar.addEventListener('click', () => {
            Swal.fire({
                title: 'Deseja cancelar?',
                text: "As informações preenchidas serão perdidas.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Sim, cancelar',
                cancelButtonText: 'Continuar preenchendo'
            }).then((result) => {
                if (result.isConfirmed) {
                    coletaForm.reset();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
        });

        const diplomaInput = document.getElementById('diploma');

        diplomaInput.addEventListener('change', function () {
            const file = this.files[0];

            if (file) {
                // Definição dos limites
                const maxSize = 5 * 1024 * 1024; // 5 Megas em bytes: $5 \times 1024 \times 1024$
                const allowedTypes = ['application/pdf', 'image/jpeg', 'image/jpg'];

                // Validação de Tipo
                if (!allowedTypes.includes(file.type)) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Formato não permitido',
                        text: 'Por favor, selecione apenas arquivos PDF ou imagens JPG.',
                        confirmButtonColor: '#ef4444'
                    });
                    this.value = ''; // Limpa o campo
                    return;
                }

                // Validação de Tamanho
                if (file.size > maxSize) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Arquivo muito pesado',
                        text: 'O tamanho máximo permitido é de 5MB. O seu arquivo possui ' + (file.size / (1024 * 1024)).toFixed(2) + 'MB.',
                        confirmButtonColor: '#ef4444'
                    });
                    this.value = ''; // Limpa o campo
                }
            }
        });
    </script>
</body>

</html>
